esphome:
  name: citigo-can
  on_boot:
    priority: 600
    then:
      - logger.log: "BOOT MARKER: CITIGO ISO-TP FLOW CONTROL 2026-06-08-01"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.31.73

web_server:

output:
  - platform: gpio
    pin: GPIO2
    id: wifi_led_output

light:
  - platform: binary
    id: wifi_status_led
    output: wifi_led_output
    internal: true

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on: wifi_status_led
          else:
            - light.toggle: wifi_status_led

globals:
  - id: last_voltage
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: last_cell_max
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: last_cell_min
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: isotp_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: isotp_expected_len
    type: int
    restore_value: no
    initial_value: "0"

  - id: isotp_next_seq
    type: int
    restore_value: no
    initial_value: "1"

  - id: isotp_buffer
    type: std::vector<uint8_t>
    restore_value: no

sensor:
  - platform: template
    name: "Citigo Battery SOC Abs"
    id: citigo_soc_abs
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    name: "Citigo Battery SOC Raw"
    id: citigo_soc_raw
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    name: "Citigo Battery Voltage"
    id: citigo_battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    name: "Citigo Battery Current"
    id: citigo_battery_current
    unit_of_measurement: "A"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    name: "Citigo Battery Power"
    id: citigo_battery_power
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    update_interval: never

  - platform: template
    name: "Citigo Battery Temperature"
    id: citigo_battery_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    name: "Citigo Cell Max Voltage"
    id: citigo_cell_max_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 4
    update_interval: never

  - platform: template
    name: "Citigo Cell Min Voltage"
    id: citigo_cell_min_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 4
    update_interval: never

  - platform: template
    name: "Citigo Cell Delta Voltage"
    id: citigo_cell_delta_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 4
    update_interval: never

  - platform: template
    name: "Citigo Range Display"
    id: citigo_range_display
    unit_of_measurement: "km"
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    name: "Citigo Range Energy"
    id: citigo_range_energy
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    name: "Citigo Charge Mgmt SOC"
    id: citigo_charge_mgmt_soc
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    name: "Citigo BMS CAC"
    id: citigo_bms_cac
    unit_of_measurement: "Ah"
    accuracy_decimals: 2
    update_interval: never

  - platform: template
    name: "Citigo BMS SOH"
    id: citigo_bms_soh
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: never

text_sensor:
  - platform: template
    name: "Citigo Last CAN Response"
    id: citigo_last_can_response
    update_interval: never

  - platform: template
    name: "Citigo Last Decoded"
    id: citigo_last_decoded
    update_interval: never

button:
  - platform: template
    name: "Citigo Request SOC"
    on_press:
      - logger.log: "Sending BMS SOC request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x02, 0x8C, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Battery Voltage"
    on_press:
      - logger.log: "Sending BMS battery voltage request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x1E, 0x3B, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Battery Current"
    on_press:
      - logger.log: "Sending BMS battery current request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x1E, 0x3D, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Battery Temperature"
    on_press:
      - logger.log: "Sending BMS battery temperature request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x2A, 0x0B, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Cell Max Voltage"
    on_press:
      - logger.log: "Sending BMS cell max voltage request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x1E, 0x33, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Cell Min Voltage"
    on_press:
      - logger.log: "Sending BMS cell min voltage request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x1E, 0x34, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Range Display"
    on_press:
      - logger.log: "Sending MFD range display request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x714
          use_extended_id: false
          data: [0x03, 0x22, 0x22, 0xE0, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Range Energy"
    on_press:
      - logger.log: "Sending MFD range energy request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x714
          use_extended_id: false
          data: [0x03, 0x22, 0x22, 0xE4, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Charge Mgmt SOC"
    on_press:
      - logger.log: "Sending charge management SOC request"
      - canbus.send:
          canbus_id: can0
          can_id: 0x765
          use_extended_id: false
          data: [0x03, 0x22, 0x1D, 0xD0, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request BMS SOH CAC"
    on_press:
      - logger.log: "3 Sending BMS SOH/CAC request, ISO-TP multi-frame"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x74, 0xCB, 0x00, 0x00, 0x00, 0x00]

  - platform: template
    name: "Citigo Request Basic Pack"
    on_press:
      - logger.log: "Requesting basic pack values"
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x02, 0x8C, 0x00, 0x00, 0x00, 0x00]
      - delay: 250ms
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x1E, 0x3B, 0x00, 0x00, 0x00, 0x00]
      - delay: 250ms
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x1E, 0x3D, 0x00, 0x00, 0x00, 0x00]
      - delay: 250ms
      - canbus.send:
          canbus_id: can0
          can_id: 0x7E5
          use_extended_id: false
          data: [0x03, 0x22, 0x2A, 0x0B, 0x00, 0x00, 0x00, 0x00]
      - delay: 250ms
      - canbus.send:
          canbus_id: can0
          can_id: 0x714
          use_extended_id: false
          data: [0x03, 0x22, 0x22, 0xE0, 0x00, 0x00, 0x00, 0x00]

canbus:
  - platform: esp32_can
    id: can0
    tx_pin: GPIO33
    rx_pin: GPIO32
    can_id: 0x7E5
    bit_rate: 500kbps

    on_frame:
      - can_id: 0x7ED
        use_extended_id: false
        then:
          - lambda: |-
              auto u16 = [](const std::vector<uint8_t>& d, int pos) -> uint16_t {
                return ((uint16_t)d[pos] << 8) | d[pos + 1];
              };

              auto s16 = [](const std::vector<uint8_t>& d, int pos) -> int16_t {
                return (int16_t)(((uint16_t)d[pos] << 8) | d[pos + 1]);
              };

              char line[220];

              // ISO-TP First Frame:
              // 10 LL 62 DID_H DID_L ...
              if (x.size() >= 8 && (x[0] & 0xF0) == 0x10) {
                int total_len = ((x[0] & 0x0F) << 8) | x[1];

                id(isotp_active) = true;
                id(isotp_expected_len) = total_len;
                id(isotp_next_seq) = 1;
                id(isotp_buffer).clear();

                for (int i = 2; i < x.size(); i++) {
                  id(isotp_buffer).push_back(x[i]);
                }

                uint16_t did = 0;
                if (id(isotp_buffer).size() >= 3 && id(isotp_buffer)[0] == 0x62) {
                  did = ((uint16_t)id(isotp_buffer)[1] << 8) | id(isotp_buffer)[2];
                }

                sprintf(line, "ISO-TP first frame total_len=%d DID=0x%04X, sending FC STmin=20ms", total_len, did);
                id(citigo_last_decoded).publish_state(line);
                ESP_LOGW("CITIGO", "%s", line);

                // Flow Control:
                // 30 = Continue To Send
                // 00 = block size unlimited
                // 14 = STmin 20 ms
                std::vector<uint8_t> fc = {0x30, 0x00, 0x14, 0x00, 0x00, 0x00, 0x00, 0x00};
                id(can0).send_data(0x7E5, false, fc);

                return;
              }

              // ISO-TP Consecutive Frame:
              // Keep this fast: no per-frame string building, no text_sensor publish.
              if (x.size() >= 2 && id(isotp_active) && (x[0] & 0xF0) == 0x20) {
                int seq = x[0] & 0x0F;

                if (seq != id(isotp_next_seq)) {
                  ESP_LOGW("CITIGO", "ISO-TP sequence mismatch: got=%d expected=%d", seq, id(isotp_next_seq));
                }

                id(isotp_next_seq) = (seq + 1) & 0x0F;

                for (int i = 1; i < x.size(); i++) {
                  if ((int) id(isotp_buffer).size() < id(isotp_expected_len)) {
                    id(isotp_buffer).push_back(x[i]);
                  }
                }

                if ((int) id(isotp_buffer).size() >= id(isotp_expected_len)) {
                  id(isotp_active) = false;

                  std::string payload;
                  char ptmp[4];

                  for (auto b : id(isotp_buffer)) {
                    sprintf(ptmp, "%02X ", b);
                    payload += ptmp;
                  }

                  ESP_LOGI("CITIGO", "ISO-TP COMPLETE len=%d payload=%s",
                           (int) id(isotp_buffer).size(),
                           payload.c_str());

                  if (id(isotp_buffer).size() >= 5 &&
                      id(isotp_buffer)[0] == 0x62 &&
                      id(isotp_buffer)[1] == 0x74 &&
                      id(isotp_buffer)[2] == 0xCB) {

                    uint16_t raw_cac = ((uint16_t)id(isotp_buffer)[3] << 8) | id(isotp_buffer)[4];

                    float cac_ah = raw_cac / 100.0f;
                    float soh = (cac_ah / 120.0f) * 100.0f;

                    id(citigo_bms_cac).publish_state(cac_ah);
                    id(citigo_bms_soh).publish_state(soh);

                    sprintf(line, "BMS CAC raw=%u CAC=%.2fAh SOH=%.1f%%", raw_cac, cac_ah, soh);
                    id(citigo_last_decoded).publish_state(line);
                    ESP_LOGI("CITIGO", "%s", line);
                  }
                }

                return;
              }

              // Build hex log only for non-consecutive frames.
              std::string data;
              char tmp[4];

              for (auto b : x) {
                sprintf(tmp, "%02X ", b);
                data += tmp;
              }

              id(citigo_last_can_response).publish_state("ID=0x7ED DATA=" + data);
              ESP_LOGI("CAN", "ID=0x7ED DATA=%s", data.c_str());

              // UDS positive single-frame:
              // [len] [0x62] [DID_H] [DID_L] [payload...]
              if (x.size() >= 4 && x[1] == 0x62) {
                uint16_t did = ((uint16_t)x[2] << 8) | x[3];

                // SOC abs: 04 62 02 8C XX ...
                if (did == 0x028C && x.size() >= 5) {
                  uint8_t raw = x[4];
                  float soc = raw / 2.5f;

                  id(citigo_soc_raw).publish_state(raw);
                  id(citigo_soc_abs).publish_state(soc);

                  sprintf(line, "SOC abs raw=%u soc=%.1f%%", raw, soc);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }

                // Battery voltage: 05 62 1E 3B XX YY ...
                else if (did == 0x1E3B && x.size() >= 6) {
                  uint16_t raw = u16(x, 4);
                  float voltage = raw / 4.0f;

                  id(last_voltage) = voltage;
                  id(citigo_battery_voltage).publish_state(voltage);

                  sprintf(line, "Battery voltage raw=%u voltage=%.1fV", raw, voltage);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }

                // Battery current: 05 62 1E 3D XX YY ...
                else if (did == 0x1E3D && x.size() >= 6) {
                  uint16_t raw = u16(x, 4);
                  float current = ((raw - 2044.0f) / 4.0f) * -1.0f;
                  float power = id(last_voltage) * current / 1000.0f;

                  id(citigo_battery_current).publish_state(current);

                  if (id(last_voltage) > 0) {
                    id(citigo_battery_power).publish_state(power);
                  }

                  sprintf(line, "Battery current raw=%u current=%.1fA power=%.2fkW", raw, current, power);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }

                // Battery temp: 05 62 2A 0B XX YY ...
                else if (did == 0x2A0B && x.size() >= 6) {
                  int16_t raw = s16(x, 4);
                  float temp = raw / 64.0f;

                  id(citigo_battery_temperature).publish_state(temp);

                  sprintf(line, "Battery temp raw=%d temp=%.1fC", raw, temp);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }

                // Cell max voltage: 05 62 1E 33 XX YY ...
                else if (did == 0x1E33 && x.size() >= 6) {
                  uint16_t raw = u16(x, 4);
                  float v = raw / 4096.0f;

                  id(last_cell_max) = v;
                  id(citigo_cell_max_voltage).publish_state(v);

                  if (id(last_cell_min) > 0) {
                    id(citigo_cell_delta_voltage).publish_state(id(last_cell_max) - id(last_cell_min));
                  }

                  sprintf(line, "Cell max raw=%u voltage=%.4fV", raw, v);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }

                // Cell min voltage: 05 62 1E 34 XX YY ...
                else if (did == 0x1E34 && x.size() >= 6) {
                  uint16_t raw = u16(x, 4);
                  float v = raw / 4096.0f;

                  id(last_cell_min) = v;
                  id(citigo_cell_min_voltage).publish_state(v);

                  if (id(last_cell_max) > 0) {
                    id(citigo_cell_delta_voltage).publish_state(id(last_cell_max) - id(last_cell_min));
                  }

                  sprintf(line, "Cell min raw=%u voltage=%.4fV", raw, v);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }
              }

              // UDS negative response:
              // 03 7F SERVICE NRC ...
              else if (x.size() >= 4 && x[1] == 0x7F) {
                sprintf(line, "UDS negative response on 0x7ED: service=0x%02X NRC=0x%02X", x[2], x[3]);
                id(citigo_last_decoded).publish_state(line);
                ESP_LOGW("CITIGO", "%s", line);
              }

      - can_id: 0x77E
        use_extended_id: false
        then:
          - lambda: |-
              auto u16 = [](const std::vector<uint8_t>& d, int pos) -> uint16_t {
                return ((uint16_t)d[pos] << 8) | d[pos + 1];
              };

              std::string data;
              char tmp[4];

              for (auto b : x) {
                sprintf(tmp, "%02X ", b);
                data += tmp;
              }

              id(citigo_last_can_response).publish_state("ID=0x77E DATA=" + data);
              ESP_LOGI("CAN", "ID=0x77E DATA=%s", data.c_str());

              char line[96];

              if (x.size() >= 4 && x[1] == 0x62) {
                uint16_t did = ((uint16_t)x[2] << 8) | x[3];

                // Range display: 05 62 22 E0 XX YY ...
                if (did == 0x22E0 && x.size() >= 6) {
                  uint16_t range = u16(x, 4);
                  id(citigo_range_display).publish_state(range);

                  sprintf(line, "Range display=%ukm", range);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }

                // Range capacity / available energy: 05 62 22 E4 XX YY ...
                else if (did == 0x22E4 && x.size() >= 6) {
                  uint16_t raw = u16(x, 4);
                  float kwh = raw / 10.0f;

                  id(citigo_range_energy).publish_state(kwh);

                  sprintf(line, "Range energy raw=%u energy=%.1fkWh", raw, kwh);
                  id(citigo_last_decoded).publish_state(line);
                  ESP_LOGI("CITIGO", "%s", line);
                }
              }

              else if (x.size() >= 4 && x[1] == 0x7F) {
                sprintf(line, "UDS negative response on 0x77E: service=0x%02X NRC=0x%02X", x[2], x[3]);
                id(citigo_last_decoded).publish_state(line);
                ESP_LOGW("CITIGO", "%s", line);
              }

      - can_id: 0x7CF
        use_extended_id: false
        then:
          - lambda: |-
              std::string data;
              char tmp[4];

              for (auto b : x) {
                sprintf(tmp, "%02X ", b);
                data += tmp;
              }

              id(citigo_last_can_response).publish_state("ID=0x7CF DATA=" + data);
              ESP_LOGI("CAN", "ID=0x7CF DATA=%s", data.c_str());

              char line[96];

              if (x.size() >= 5 &&
                  x[1] == 0x62 &&
                  x[2] == 0x1D &&
                  x[3] == 0xD0) {
                uint8_t raw = x[4];
                float soc = raw / 2.0f;

                id(citigo_charge_mgmt_soc).publish_state(soc);

                sprintf(line, "Charge mgmt SOC raw=%u soc=%.1f%%", raw, soc);
                id(citigo_last_decoded).publish_state(line);
                ESP_LOGI("CITIGO", "%s", line);
              }

              else if (x.size() >= 4 && x[1] == 0x7F) {
                sprintf(line, "UDS negative response on 0x7CF: service=0x%02X NRC=0x%02X", x[2], x[3]);
                id(citigo_last_decoded).publish_state(line);
                ESP_LOGW("CITIGO", "%s", line);
              }
